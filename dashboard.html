:root{

*{

body{

/* CONTAINER */  
  
.container{  
    width:100%;

/* HEADER */  
  
header{  
    width:100%;

header h2{

/* BOTÕES */  
  
.btn{  
    border:none;  
    cursor:pointer;  
    transition:0.2s;  
}  
  
.btn:hover{  
    transform:translateY(-2px);  
}  
  
.btn-primary{  
    background:var(--primary);  
    color:#fff;  
    border-radius:14px;  
    padding:10px 14px;  
}  
  
.btn-ghost{  
    background:#f5f5f5;

    border-radius:14px;

}  
  
.theme-btn{  
    width:45px;  
    height:45px;  
    border:none;  
    border-radius:14px;  
    background:#f5f5f5;  
    cursor:pointer;  
    font-size:18px;  
}  
  
/* CARD */  
  
.card{  
    width:100%;  
    background:var(--card);  
    border-radius:28px;  
    padding:24px;  
    box-shadow:0 8px 30px rgba(0,0,0,0.05);  
}  
  
/* TABLE */  
  
table{  
    width:100%;  
    border-collapse:collapse;  
}  
  
thead{  
    background:#fafafa;  
}  
  
th{  
    padding:18px;  
    text-align:left;  
    font-size:14px;  
    color:var(--text-muted);  
    border-bottom:1px solid var(--border);  
}  
  
td{  
    padding:18px;  
    border-bottom:1px solid var(--border);  
}  
  
tbody tr{  
    transition:0.2s;  
}  
  
tbody tr:hover{  
    background:#fafafa;  
}  
  
/* MODAL */  
  
.modal-overlay{  
    position:fixed;  
    inset:0;  
    background:rgba(0,0,0,0.4);  
    display:none;  
    align-items:center;  
    justify-content:center;  
    padding:20px;  
    z-index:100;  
}  
  
.modal-overlay.active{  
    display:flex;  
}  
  
.modal{  
    width:100%;  
    max-width:400px;  
    background:#ffffff;  
    border-radius:28px;  
    padding:25px;  
    animation:fadeIn 0.2s ease;  
}  
  
.modal h3{  
    margin-bottom:20px;  
    font-size:22px;  
}  
  
.stats-box{  
    width:100%;  
    background:#f7f7f7;  
    border-radius:20px;  
    padding:18px;  
    margin-bottom:15px;  
}  
  
.stats-label{  
    font-size:14px;  
    color:var(--text-muted);  
    margin-bottom:8px;  
}  
  
.stats-value{  
    font-size:26px;  
    font-weight:bold;  
}  
  
.close-btn{  
    width:100%;  
    margin-top:10px;  
}  
  
/* ANIMAÇÃO */  
  
@keyframes fadeIn{  
  
    from{  
        opacity:0;  
        transform:translateY(10px);  
    }  
  
    to{  
        opacity:1;  
        transform:translateY(0);  
    }  
  
}  
  
/* RESPONSIVO */  
  
@media(max-width:768px){  
  
    header{  
        flex-direction:column;  
        gap:20px;  
        align-items:flex-start;  
    }  
  
    table{  
        min-width:700px;  
    }  
  
}  
  
.hidden{  
    display:none;  
}  
  
</style>  </head>

<script>  
    /* =========================================  
DADOS DO LOGIN  
========================================= */  const token = localStorage.getItem("token");
const codigoAluno = localStorage.getItem("codigoAluno");

/* ELEMENTOS */

const greeting = document.getElementById("greeting");

const turmaInfo = document.getElementById("turma-info");

const escolaInfo = document.getElementById("escola-info");

/* API */

if(!token || !codigoAluno){

alert("Login não encontrado.");  

window.location.href = "index.html";

}

/* CARREGAR DADOS */

async function carregarDadosAluno(){

try{  

    /* BUSCAR TURMA */  

    const responseTurma = await fetch(  
`/.netlify/functions/turma?codigoAluno=${codigoAluno}`,  
{  
    method:"GET",  
    headers:{  
        "Authorization":`Bearer ${token}`  
    }  
}

);

const turmaData = await responseTurma.json();  

    console.log("Turma:", turmaData);  

    const turma = turmaData.data[0];  

    /* NOME */  

    const nomeCompleto = localStorage.getItem("nome");  

    const primeiroNome = nomeCompleto  
? nomeCompleto.split(" ")[0]  
: "Aluno";  

    greeting.textContent = `Olá, ${primeiroNome}!`;  

    /* TURMA */  

    turmaInfo.textContent =  
        `${turma.NumeroSerie}º Ano ${turma.IdentificadorTurma}`;  

    /* ESCOLA */  

    escolaInfo.textContent =  
        turma.NomeEscola;  

    /* TÍTULO */  

    document.title =  
        `${turma.NumeroSerie}º Ano ${turma.IdentificadorTurma}`;  

}catch(error){  

    console.error(error);  

    greeting.textContent = "Erro ao carregar";  

    turmaInfo.textContent =  
        "Erro ao carregar turma";  

    escolaInfo.textContent =  
        "Erro ao carregar escola";  

}

}

/* INICIAR */

carregarDadosAluno();

/* THEME */

function toggleTheme(){

alert("Sistema de tema aqui.");

}

/* LOGOUT */

function logout(){

alert("Logout aqui.");

}

/* EXPORTAR */

function exportarDados(){

alert("Exportação aqui.");

}

/* IMPORTAR */

function importarDados(event){

alert("Importação aqui.");

}

/* EDITAR */

function editarAluno(ra){

alert("Editar aluno: " + ra);

}

/* DELETAR */

function deletarAluno(ra){

const confirmar = confirm("Deseja deletar o aluno " + ra + "?");  

if(confirmar){  

    alert("Aluno deletado.");  

}

}

/* MODAL ESTATÍSTICAS */

async function verificarDesempenho(ra, senha){

try{  

    document.getElementById("pendencias").textContent = "...";  
    document.getElementById("expiradas").textContent = "...";  

    document.getElementById("statsModal")  
        .classList.add("active");  

    /* BUSCAR DADOS DAS TAREFAS */  

    const nick = localStorage.getItem("nick");
const rooms = localStorage.getItem("rooms");

const params = new URLSearchParams({
    authToken: token,
    nick: nick,
    rooms: rooms,
    expired: "false"
});

const response = await fetch(
    `/.netlify/functions/tarefas?${params.toString()}`,
    {
        method:"GET"
    }
);  

    const data = await response.json();  

    console.log("Tarefas:", data);  

    /* CONTAGEM */  

    const pendentes =  
        Array.isArray(data.pendentes)  
        ? data.pendentes.length  
        : 0;  

    const expiradas =  
        Array.isArray(data.expiradas)  
        ? data.expiradas.length  
        : 0;  

    /* ATUALIZAR MODAL */  

    document.getElementById("pendencias")  
        .textContent = pendentes;  

    document.getElementById("expiradas")  
        .textContent = expiradas;  

}catch(error){  

    console.error(error);  

    document.getElementById("pendencias")  
        .textContent = "Erro";  

    document.getElementById("expiradas")  
        .textContent = "Erro";  

}

}

/* FECHAR MODAL */

function fecharModal(){

document.getElementById("statsModal")  
    .classList.remove("active");

}

/* FECHAR AO CLICAR FORA */

document.getElementById("statsModal")
.addEventListener("click", (e) => {

if(e.target.id === "statsModal"){  

    fecharModal();  

}

});

/* =========================================

ALUNOS
========================================= */

let alunos =
JSON.parse(localStorage.getItem("alunos")) || [];

const corpoTabela =
document.getElementById("corpo-tabela");

/* RENDERIZAR */

function renderizarAlunos(){

corpoTabela.innerHTML = "";  

alunos.forEach((aluno, index) => {  

    corpoTabela.innerHTML += `  
      
    <tr>  

        <td style="font-weight: 600; font-family: monospace;">  
            ${aluno.ra}  
        </td>  

        <td style="color: var(--text-muted); font-size: 14px;">  
            ${aluno.sala}  
        </td>  

        <td style="text-align: right;">  

            <button   
                class="btn btn-ghost"  
                style="padding: 6px 10px"  
                onclick="editarAluno(${index})"  
            >  
                <i class="fas fa-edit"></i>  
            </button>  

            <button   
                class="btn btn-ghost"  
                style="padding: 6px 10px; color: var(--danger)"  
                onclick="deletarAluno(${index})"  
            >  
                <i class="fas fa-trash"></i>  
            </button>  

            <button   
                class="btn btn-primary"  
                style="padding: 6px 10px"  
                onclick="verificarDesempenho('${aluno.ra}')"  
            >  
                <i class="fas fa-chart-simple"></i>  
            </button>  

        </td>  

    </tr>  
      
    `;  

});

}

/* MODAL */

function abrirModalAluno(){

document  
    .getElementById("alunoModal")  
    .classList.add("active");

}

function fecharModalAluno(){

document  
    .getElementById("alunoModal")  
    .classList.remove("active");

}

/* ADICIONAR */

async function adicionarAluno(){

const ra =  
    document.getElementById("novo-ra")  
    .value.trim();  

const digito =  
    document.getElementById("novo-digito")  
    .value.trim();  

const uf =  
    document.getElementById("nova-uf")  
    .value.trim().toUpperCase();  

const senha =  
    document.getElementById("nova-senha")  
    .value.trim();  

if(!ra || !digito || !uf || !senha){  

    alert("Preencha todos os campos.");  
    return;  

}  

const usuario =  
    `${ra}${digito}${uf}`;  

try{  

    const response = await fetch(  
        "/.netlify/functions/loginAluno",  
        {  
            method:"POST",  
            headers:{  
                "Content-Type":"application/json",  
                "Accept":"application/json"  
            },  
            body:JSON.stringify({  
                user:usuario,  
                senha:senha  
            })  
        }  
    );  

    const data = await response.json();  

    if(!response.ok){  

        alert("Login inválido.");  
        console.log(data);  
        return;  

    }  

    alunos.push({

    ra: usuario,
    senha: senha,

    token:
        data.token ||
        data.Token ||
        "",

    codigoAluno:
        data.CD_USUARIO ||
        "",

    nick:
        data.NICKNAME ||
        "",

    rooms:
        data.ROOMS || []

});  

    localStorage.setItem(  
        "alunos",  
        JSON.stringify(alunos)  
    );  

    renderizarAlunos();  

    document.getElementById("novo-ra").value = "";  
    document.getElementById("novo-digito").value = "";  
    document.getElementById("nova-uf").value = "";  
    document.getElementById("nova-senha").value = "";  

    fecharModalAluno();  

    alert("Aluno adicionado.");  

}catch(error){  

    console.error(error);  

    alert("Erro ao conectar.");  

}

}

/* EDITAR */

function editarAluno(index){

const novoRA = prompt(  
    "Novo RA:",  
    alunos[index].ra  
);  

if(!novoRA) return;  

const novaSala = prompt(  
    "Nova sala:",  
    alunos[index].sala  
);  

if(!novaSala) return;  

alunos[index].ra = novoRA;  
alunos[index].sala = novaSala;  

localStorage.setItem(  
    "alunos",  
    JSON.stringify(alunos)  
);  

renderizarAlunos();

}

/* DELETAR */

function deletarAluno(index){

const confirmar = confirm(  
    "Deseja remover este aluno?"  
);  

if(!confirmar) return;  

alunos.splice(index, 1);  

localStorage.setItem(  
    "alunos",  
    JSON.stringify(alunos)  
);  

renderizarAlunos();

}

/* EXPORTAR */

function exportarDados(){

const blob = new Blob(  
    [JSON.stringify(alunos, null, 4)],  
    { type:"application/json" }  
);  

const url = URL.createObjectURL(blob);  

const a = document.createElement("a");  

a.href = url;  
a.download = "alunos.json";  
a.click();

}

/* IMPORTAR */

function importarDados(event){

const arquivo = event.target.files[0];  

if(!arquivo) return;  

const leitor = new FileReader();  

leitor.onload = function(e){  

    try{  

        alunos = JSON.parse(e.target.result);  

        localStorage.setItem(  
            "alunos",  
            JSON.stringify(alunos)  
        );  

        renderizarAlunos();  

        alert("Importado com sucesso.");  

    }catch{  

        alert("Arquivo inválido.");  

    }  

};  

leitor.readAsText(arquivo);

}

/* TEMA */

function toggleTheme(){

document.body.classList.toggle("dark");  

const dark =  
    document.body.classList.contains("dark");  

if(dark){  

    document.documentElement.style.setProperty("--bg", "#111111");  
    document.documentElement.style.setProperty("--card", "#1c1c1c");  
    document.documentElement.style.setProperty("--text", "#ffffff");  
    document.documentElement.style.setProperty("--text-muted", "#aaaaaa");  
    document.documentElement.style.setProperty("--border", "#333333");  

}else{  

    document.documentElement.style.setProperty("--bg", "#f3f3f3");  
    document.documentElement.style.setProperty("--card", "#ffffff");  
    document.documentElement.style.setProperty("--text", "#111111");  
    document.documentElement.style.setProperty("--text-muted", "#666666");  
    document.documentElement.style.setProperty("--border", "#ececec");  

}

}

/* LOGOUT */

function logout(){

const confirmar = confirm(  
    "Deseja sair?"  
);  

if(!confirmar) return;  

localStorage.clear();  

window.location.href = "index.html";

}

/* INICIAR */

renderizarAlunos();
</script>
