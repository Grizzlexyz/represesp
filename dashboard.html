========================================= */  const token = localStorage.getItem("token");

/* ELEMENTOS */

const turmaInfo = document.getElementById("turma-info");

alert("Login não encontrado.");

/* CARREGAR DADOS */

async function carregarDadosAluno(){

    try{

        const response = await fetch(
            "https://representa-api.onrender.com/loginAluno",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Accept":"application/json"
                },
                body:JSON.stringify({
                    user: localStorage.getItem("login"),
                    senha: localStorage.getItem("senha")
                })
            }
        );

        const data = await response.json();

        console.log("DADOS:", data);

        if(!response.ok){

            throw new Error(
                data.message || "Erro API"
            );

        }

        /* NOME */

        const nomeCompleto =
            data?.login?.DadosUsuario?.NAME ||
            "Aluno";

        const primeiroNome =
            nomeCompleto.split(" ")[0];

        greeting.textContent =
            `Olá, ${primeiroNome}!`;

        /* TURMA */

        const turma =
            data?.turma?.data?.[0];

        if(turma){

            turmaInfo.textContent =
                `${turma.NumeroSerie}º Ano ${turma.IdentificadorTurma}`;

            escolaInfo.textContent =
                turma.NomeEscola || "Sem escola";

            document.title = "Representa SP";

        }else{

            turmaInfo.textContent =
                "Turma não encontrada";

            escolaInfo.textContent =
                "Escola não encontrada";

        }

    }catch(error){

        console.error(error);

        greeting.textContent =
            "Erro ao carregar nome";

        turmaInfo.textContent =
            "Erro ao carregar turma";

        escolaInfo.textContent =
            "Erro ao carregar escola";

    }

  }

async function verificarDesempenho(index){

    try{

        document.getElementById(
            "pendencias"
        ).textContent = "...";

        document.getElementById(
            "expiradas"
        ).textContent = "...";

        document
            .getElementById("statsModal")
            .classList.add("active");

        const aluno = alunos[index];

        if(
            !aluno ||
            !aluno.token ||
            !aluno.rooms
        ){

            throw new Error(
                "Aluno sem token ou rooms."
            );

        }

        /* PUBLICATION TARGETS */

        const targets = [];

        aluno.rooms.forEach(room => {

            if(room?.name){

                targets.push(room.name);

                if(aluno.nick){

                    targets.push(
                        `${room.name}:${aluno.nick}`
                    );

                }

            }

            if(
                Array.isArray(
                    room.group_categories
                )
            ){

                room.group_categories
                .forEach(cat => {

                    targets.push(
                        String(cat)
                    );

                });

            }

        });

        /* REMOVE DUPLICADOS */

        const publicationTargets =
            [...new Set(targets)];

        /* QUERY */

        const criarQuery = (
            expiredOnly,
            filterExpired
        ) => {

            const params =
                new URLSearchParams();

            params.append(
                "expired_only",
                expiredOnly
            );

            params.append(
                "limit",
                "100"
            );

            params.append(
                "offset",
                "0"
            );

            params.append(
                "filter_expired",
                filterExpired
            );

            params.append(
                "is_exam",
                "false"
            );

            params.append(
                "with_answer",
                "true"
            );

            params.append(
                "is_essay",
                "false"
            );

            params.append(
                "answer_statuses",
                "draft"
            );

            params.append(
                "with_apply_moment",
                "true"
            );

            publicationTargets
            .forEach(target => {

                params.append(
                    "publication_target",
                    target
                );

            });

            return params.toString();

        };

        /* PENDENTES */

        const pendentesUrl =
            "https://edusp-api.ip.tv/tms/task/todo?" +
            criarQuery(
                "false",
                "true"
            );

        /* EXPIRADAS */

        const expiradasUrl =
            "https://edusp-api.ip.tv/tms/task/todo?" +
            criarQuery(
                "true",
                "false"
            );

        console.log(
            "URL PENDENTES:",
            pendentesUrl
        );

        console.log(
            "URL EXPIRADAS:",
            expiradasUrl
        );

        /* FETCH */

        const [
            pendentesResponse,
            expiradasResponse
        ] = await Promise.all([

            fetch(
                pendentesUrl,
                {
                    method:"GET",
                    headers:{
                        "Accept":"application/json",
                        "Content-Type":"application/json",
                        "x-api-key": aluno.authToken
                    }
                }
            ),

            fetch(
                expiradasUrl,
                {
                    method:"GET",
                    headers:{
                        "Accept":"application/json",
                        "Content-Type":"application/json",
                        "x-api-key": aluno.authToken
                    }
                }
            )

        ]);

        const pendentesData =
            await pendentesResponse.json();

        const expiradasData =
            await expiradasResponse.json();

        console.log(
            "PENDENTES:",
            pendentesData
        );

        console.log(
            "EXPIRADAS:",
            expiradasData
        );

        /* TOTAL */

        const totalPendentes =
            Array.isArray(
                pendentesData
            )
            ? pendentesData.length
            : 0;

        const totalExpiradas =
            Array.isArray(
                expiradasData
            )
            ? expiradasData.length
            : 0;

        /* MOSTRAR */

        document.getElementById(
            "pendencias"
        ).textContent =
            totalPendentes;

        document.getElementById(
            "expiradas"
        ).textContent =
            totalExpiradas;

    }catch(error){

        console.error(
            "ERRO STATUS:",
            error
        );

        document.getElementById(
            "pendencias"
        ).textContent = "Erro";

        document.getElementById(
            "expiradas"
        ).textContent = "Erro";

    }

    }

/* PARSE JWT */

function parseJwt(token){

    try{

        const base64Url =
            token.split(".")[1];

        const base64 =
            base64Url
            .replace(/-/g, "+")
            .replace(/_/g, "/");

        const jsonPayload =
            decodeURIComponent(

                atob(base64)
                .split("")
                .map(c => {

                    return "%" +
                    ("00" + c.charCodeAt(0).toString(16))
                    .slice(-2);

                })
                .join("")

            );

        return JSON.parse(jsonPayload);

    }catch(error){

        console.error(
            "ERRO PARSE JWT:",
            error
        );

        return {};

    }

  }
  async function buscarRooms(token, nick){

    try{

        const response = await fetch(
            "https://edusp-api.ip.tv/survey/todo/count",
            {
                method:"GET",
                headers:{
                    "Accept":"application/json",
                    "Authorization":"Bearer " + token
                }
            }
        );

        console.log("STATUS ROOMS:", response.status);

        /* SE DER ERRO NÃO QUEBRA O SISTEMA */

        if(!response.ok){

            console.log("Falha ao buscar rooms");

            return [];

        }

        const finalUrl = response.url;

        console.log("URL FINAL:", finalUrl);

        const url = new URL(finalUrl);

        const targets =
            url.searchParams.getAll(
                "publication_target"
            );

        console.log("TARGETS:", targets);

        const roomsMap = {};

        targets.forEach(target => {

            if(target.includes(":")){
                return;
            }

            if(/^\d+$/.test(target)){
                return;
            }

            if(!roomsMap[target]){

                roomsMap[target] = {
                    name: target,
                    group_categories:[]
                };

            }

        });

        targets.forEach(target => {

            if(/^\d+$/.test(target)){

                const firstRoom =
                    Object.keys(roomsMap)[0];

                if(firstRoom){

                    roomsMap[firstRoom]
                        .group_categories
                        .push({
                            id: target
                        });

                }

            }

        });

        return Object.values(
            roomsMap
        );

    }catch(error){

        console.error(
            "ERRO ROOMS:",
            error
        );

        return [];

    }

  }

  /* PARSE JWT */

function parseJwt(token){

    try{

        if(!token){

            console.error(
                "TOKEN VAZIO NO parseJwt"
            );

            return {};

        }

        const base64Url =
            token.split(".")[1];

        const base64 =
            base64Url
            .replace(/-/g, "+")
            .replace(/_/g, "/");

        const jsonPayload =
            decodeURIComponent(

                atob(base64)
                .split("")
                .map(c => {

                    return "%" +
                    ("00" + c.charCodeAt(0).toString(16))
                    .slice(-2);

                })
                .join("")

            );

        return JSON.parse(jsonPayload);

    }catch(error){

        console.error(
            "ERRO parseJwt:",
            error
        );

        return {};

    }

  }

/* IMPORTAR */

function importarDados(event){

const arquivo = event.target.files[0];  

if(!arquivo) return;  

const leitor = new FileReader();  

leitor.onload = function(e){  

    try{  

        alunos = JSON.parse(e.target.result);  

        localStorage.setItem(  
            "alunos",  
            JSON.stringify(alunos)  
        );  

        renderizarAlunos();  

        alert("Importado com sucesso.");  

    }catch{  

        alert("Arquivo inválido.");  

    }  

};  

leitor.readAsText(arquivo);

}
