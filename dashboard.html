<script>  
    /* =========================================  
DADOS DO LOGIN  
========================================= */  const token = localStorage.getItem("token");
const codigoAluno = localStorage.getItem("codigoAluno");

/* ELEMENTOS */

const greeting = document.getElementById("greeting");

const turmaInfo = document.getElementById("turma-info");

const escolaInfo = document.getElementById("escola-info");

/* API */

if(!token || !codigoAluno){

alert("Login não encontrado.");  

window.location.href = "index.html";

}

/* CARREGAR DADOS */

async function carregarDadosAluno(){

    try{

        const response = await fetch(
            "https://representa-api.onrender.com/loginAluno",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Accept":"application/json"
                },
                body:JSON.stringify({
                    user: localStorage.getItem("login"),
                    senha: localStorage.getItem("senha")
                })
            }
        );

        const data = await response.json();

        console.log("DADOS:", data);

        if(!response.ok){

            throw new Error(
                data.message || "Erro API"
            );

        }

        /* NOME */

        const nomeCompleto =
            data?.login?.DadosUsuario?.NAME ||
            "Aluno";

        const primeiroNome =
            nomeCompleto.split(" ")[0];

        greeting.textContent =
            `Olá, ${primeiroNome}!`;

        /* TURMA */

        const turma =
            data?.turma?.data?.[0];

        if(turma){

            turmaInfo.textContent =
                `${turma.NumeroSerie}º Ano ${turma.IdentificadorTurma}`;

            escolaInfo.textContent =
                turma.NomeEscola || "Sem escola";

            document.title =
                `${turma.NumeroSerie}º Ano ${turma.IdentificadorTurma}`;

        }else{

            turmaInfo.textContent =
                "Turma não encontrada";

            escolaInfo.textContent =
                "Escola não encontrada";

        }

    }catch(error){

        console.error(error);

        greeting.textContent =
            "Erro ao carregar nome";

        turmaInfo.textContent =
            "Erro ao carregar turma";

        escolaInfo.textContent =
            "Erro ao carregar escola";

    }

  }

/* INICIAR */

/* MODAL ESTATÍSTICAS */

async function verificarDesempenho(index){

    try{

        const aluno = alunos[index];

        if(!aluno?.token){

            throw new Error("Sem token");

        }

        document
            .getElementById("statsModal")
            .classList.add("active");

        document.getElementById(
            "pendencias"
        ).textContent = "...";

        document.getElementById(
            "expiradas"
        ).textContent = "...";

        document.getElementById(
            "frequencia"
        ).textContent = "...";

        /*
        =========================================
        PUBLICATION TARGETS
        =========================================
        */

        const publicationTargets = [

            "r36a18ac084f954070-l",
            "r5a5ec1aa99f65904f-l",
            "rd196c555145563b66-l",

            "1204",
            "1828",
            "1854",
            "767",
            "1928",
            "1834",

            `r36a18ac084f954070-l:${aluno.nick}`,
            `r5a5ec1aa99f65904f-l:${aluno.nick}`,
            `rd196c555145563b66-l:${aluno.nick}`

        ];

        const params =
            publicationTargets
            .map(p =>
                `publication_target=${encodeURIComponent(p)}`
            )
            .join("&");

        /*
        =========================================
        TAREFAS
        =========================================
        */

        const tarefasResponse =
            await fetch(

                `https://edusp-api.ip.tv/tms/task/todo/count?${params}&filter_expired=true&with_answer=true&answer_statuses=draft&answer_statuses=pending`,

                {
                    headers:{
                        "Accept":"application/json",
                        "Content-Type":"application/json",
                        "x-api-key": aluno.iptvToken
                    }
                }

            );

        const tarefasData =
            await tarefasResponse.json();

        const totalTarefas =
            tarefasData?.[0]?.count || 0;

        /*
        =========================================
        MENSAGENS
        =========================================
        */

        const mensagensResponse =
            await fetch(

                `https://edusp-api.ip.tv/survey/todo/count?${params}&filter_expired=true&with_answer=true&answer_statuses=draft`,

                {
                    headers:{
                        "Accept":"application/json",
                        "Content-Type":"application/json",
                        "x-api-key": aluno.iptvToken
                    }
                }

            );

        const mensagensData =
            await mensagensResponse.json();

        const totalMensagens =
            mensagensData?.count || 0;

        /*
        =========================================
        FALTAS
        =========================================
        */

        const faltasResponse =
            await fetch(

                `https://sedintegracoes.educacao.sp.gov.br/saladofuturobffapi/apiboletim/api/Frequencia/GetFaltasBimestreAtual?codigoAluno=${aluno.codigoAluno}`,

                {
                    headers:{
                        "Accept":"application/json, text/plain, */*",
                        "Authorization":
                             `Bearer ${aluno.token}`,
                        "Ocp-Apim-Subscription-Key":
                            "d701a2043aa24d7ebb37e9adf60d043b"
                    }
                }

            );

        const faltasData =
            await faltasResponse.json();

        const frequencia =
            faltasData?.data?.[0]
            ?.porcentagemFrequencia || 0;

        const faltas =
            faltasData?.data?.[0]
            ?.totalFaltasBimestre || 0;

        /*
        =========================================
        UI
        =========================================
        */

        document.getElementById(
            "pendencias"
        ).textContent =
            totalTarefas;

        document.getElementById(
            "expiradas"
        ).textContent =
            totalMensagens;

        const frequenciaEl =
            document.getElementById(
                "frequencia"
            );

        frequenciaEl.textContent =
            `${frequencia}%`;

        document.getElementById(
    "faltas-info"
).textContent =
    `${faltas} faltas • ${frequencia}% presença`;

        /*
        =========================================
        CORES
        =========================================
        */

        if(frequencia >= 70){

            frequenciaEl.style.color =
                "#22c55e";

        }else if(frequencia >= 40){

            frequenciaEl.style.color =
                "#eab308";

        }else{

            frequenciaEl.style.color =
                "#ef4444";

        }

    }catch(error){

        console.error(error);

        document.getElementById(
            "pendencias"
        ).textContent = "Erro";

        document.getElementById(
            "expiradas"
        ).textContent = "Erro";

        document.getElementById(
            "frequencia"
        ).textContent = "Erro";

    }

}

                    class="btn btn-ghost"

                    onclick="editarAluno(${index})"

                    <i class="fas fa-edit"></i>

                <button

                    style="padding:6px 10px; color:var(--danger)"

                >
                    <i class="fas fa-trash"></i>

                <button

                >
                    <i class="fas fa-chart-simple"></i>

            </td>

        </tr>
        
        `;

    });

}

/* ADICIONAR */

async function adicionarAluno(){

const ra =  
    document.getElementById("novo-ra")  
    .value.trim();  

const digito =  
    document.getElementById("novo-digito")  
    .value.trim();  

const uf =  
    document.getElementById("nova-uf")  
    .value.trim().toUpperCase();  

const senha =  
    document.getElementById("nova-senha")  
    .value.trim();  

if(!ra || !digito || !uf || !senha){  

    alert("Preencha todos os campos.");  
    return;  

}  

const usuario =  
    `${ra}${digito}${uf}`;  

try{  

    const response = await fetch(  
        "https://representa-api.onrender.com/loginAluno",  
        {  
            method:"POST",  
            headers:{  
                "Content-Type":"application/json",  
                "Accept":"application/json"  
            },  
            body:JSON.stringify({  
                user:usuario,  
                senha:senha  
            })  
        }  
    );  

    const data = await response.json();  

    if(!response.ok){  

        alert("Login inválido.");
console.log(data);
return;

}


alunos.push({

    nome:
    data?.login?.DadosUsuario?.NAME ||
    data?.DadosUsuario?.NAME ||
    "Aluno",

    ra: usuario,

    senha: senha,

    sedToken:
    data?.token ||
    data?.Token ||
    "",

iptvToken:
    data?.auth_token ||
    data?.login?.auth_token ||
    "",

    codigoAluno:
        data.CD_USUARIO ||
        data?.login?.DadosUsuario?.CD_USUARIO ||
        "",

    nick:
        data?.login?.DadosUsuario?.NICKNAME ||
        usuario.toLowerCase(),

    sala:
        data?.turma?.data?.[0]
        ?.DescricaoTurma ||
        "Sem sala",

    codigoEscola:
        data?.turma?.data?.[0]
        ?.CodigoEscola ||
        0

});

    localStorage.setItem(  
        "alunos",  
        JSON.stringify(alunos)  
    );  

    renderizarAlunos();  

    document.getElementById("novo-ra").value = "";  
    document.getElementById("novo-digito").value = "";  
    document.getElementById("nova-uf").value = "";  
    document.getElementById("nova-senha").value = "";  

    fecharModalAluno();  

    alert("Aluno adicionado.");  

}catch(error){  

    console.error(error);  

    alert("Erro ao conectar.");  

}

}

/* EDITAR */

function editarAluno(index){

const novoRA = prompt(  
    "Novo RA:",  
    alunos[index].ra  
);  

if(!novoRA) return;  

const novaSala = prompt(  
    "Nova sala:",  
    alunos[index].sala  
);  

if(!novaSala) return;  

alunos[index].ra = novoRA;  
alunos[index].sala = novaSala;  

localStorage.setItem(  
    "alunos",  
    JSON.stringify(alunos)  
);  

renderizarAlunos();

}

/* DELETAR */

function deletarAluno(index){

const confirmar = confirm(  
    "Deseja remover este aluno?"  
);  

if(!confirmar) return;  

alunos.splice(index, 1);  

localStorage.setItem(  
    "alunos",  
    JSON.stringify(alunos)  
);  

renderizarAlunos();

}

/* EXPORTAR */

function exportarDados(){

const blob = new Blob(  
    [JSON.stringify(alunos, null, 4)],  
    { type:"application/json" }  
);  

const url = URL.createObjectURL(blob);  

const a = document.createElement("a");  

a.href = url;  
a.download = "alunos.json";  
a.click();

}

/* IMPORTAR */

function importarDados(event){

const arquivo = event.target.files[0];  

if(!arquivo) return;  

const leitor = new FileReader();  

leitor.onload = function(e){  

    try{  

        alunos = JSON.parse(e.target.result);  

        localStorage.setItem(  
            "alunos",  
            JSON.stringify(alunos)  
        );  

        renderizarAlunos();  

        alert("Importado com sucesso.");  

    }catch{  

        alert("Arquivo inválido.");  

    }  

};  

leitor.readAsText(arquivo);

}

/* TEMA */

function toggleTheme(){

document.body.classList.toggle("dark");  

const dark =  
    document.body.classList.contains("dark");  

if(dark){  

    document.documentElement.style.setProperty("--bg", "#111111");  
    document.documentElement.style.setProperty("--card", "#1c1c1c");  
    document.documentElement.style.setProperty("--text", "#ffffff");  
    document.documentElement.style.setProperty("--text-muted", "#aaaaaa");  
    document.documentElement.style.setProperty("--border", "#333333");  

}else{  

    document.documentElement.style.setProperty("--bg", "#f3f3f3");  
    document.documentElement.style.setProperty("--card", "#ffffff");  
    document.documentElement.style.setProperty("--text", "#111111");  
    document.documentElement.style.setProperty("--text-muted", "#666666");  
    document.documentElement.style.setProperty("--border", "#ececec");  

}

}

/* LOGOUT */

function logout(){

const confirmar = confirm(  
    "Deseja sair?"  
);  

if(!confirmar) return;  

localStorage.clear();  

window.location.href = "index.html";

}

/* INICIAR */

renderizarAlunos();
</script>
