<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    width:100%;
    min-height:100vh;
    background:#f3f3f3;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* LOGIN */

.login-container{
    width:100%;
    max-width:420px;
    background:#ffffff;
    padding:35px;
    border-radius:24px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#6f2cff;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#333;
}

.input-group input{
    width:100%;
    height:55px;
    border:2px solid #e5e5e5;
    border-radius:16px;
    padding:0 18px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#6f2cff;
}

.password-wrapper{
    position:relative;
}

.toggle-password{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    font-size:14px;
    color:#6f2cff;
    font-weight:bold;
}

.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:18px;
    background:#6f2cff;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    opacity:0.9;
    transform:translateY(-2px);
}



.loading{
    display:none;
    margin-top:15px;
    text-align:center;
    color:#6f2cff;
    font-weight:bold;
}

.error-message{
    display:none;
    margin-top:15px;
    text-align:center;
    color:#ff3b3b;
    font-size:14px;
    font-weight:bold;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginContainer">

    <div class="logo">
        Representa <span style="color:#000;">SP</span>
    </div>

    <form id="loginForm">

        <div class="input-group">

    <label>RA</label>

    <div style="
    display:flex;
    gap:10px;
">

    <!-- RA -->

    <input 
        type="text"
        id="ra"
        placeholder="RA"
        required
        style="flex:1;"
    >

    <!-- DÍGITO -->

    <input 
        type="text"
        id="digito"
        placeholder="0"
        maxlength="1"
        required
        style="
            width:70px;
            height:55px;
            border:2px solid #e5e5e5;
            border-radius:16px;
            padding:0 10px;
            font-size:16px;
            outline:none;
            text-align:center;
        "
    >

    <!-- UF -->

    <select 
        id="uf"
        style="
            width:90px;
            height:55px;
            border:2px solid #e5e5e5;
            border-radius:16px;
            padding:0 10px;
            font-size:16px;
            outline:none;
            background:#fff;
            color:#000;
        "
    >

        <option value="SP">SP</option>
        <option value="RJ">RJ</option>
        <option value="MG">MG</option>
        <option value="PR">PR</option>
        <option value="RS">RS</option>

    </select>

</div>
</div>
        <div class="input-group">
            <label>Senha</label>

            <div class="password-wrapper">
                <input 
                    type="password" 
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                >

                <button 
                    type="button"
                    class="toggle-password"
                    id="togglePassword"
                >
                    Mostrar
                </button>
            </div>
        </div>

        <button type="submit" class="login-btn">
            Entrar
        </button>

        <div class="loading" id="loading">
            
        </div>
        <div class="error-message" id="errorMessage"></div>

    </form>

</div>



<script>
const loginForm = document.getElementById("loginForm");
const togglePassword = document.getElementById("togglePassword");
const senhaInput = document.getElementById("senha");


const loading = document.getElementById("loading");
const errorMessage = document.getElementById("errorMessage");

const loginBtn = document.querySelector(".login-btn");

const API_KEY = "d701a2043aa24d7ebb37e9adf60d043b";
/* AUTO LOGIN */

if(localStorage.getItem("token")){

    window.location.href = "dashboard.html";

}

/* MOSTRAR / OCULTAR SENHA */

togglePassword.addEventListener("click", () => {

    if(senhaInput.type === "password"){
        senhaInput.type = "text";
        togglePassword.textContent = "Ocultar";
    } else {
        senhaInput.type = "password";
        togglePassword.textContent = "Mostrar";
    }

});

/* LOGIN */

loginForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    errorMessage.style.display = "none";

    const raBase = document
        .getElementById("ra")
        .value
        .trim();

    const digito = document
        .getElementById("digito")
        .value
        .trim();

    const uf = document
        .getElementById("uf")
        .value;

    const ra = `${raBase}${digito}${uf}`;

    const senha = senhaInput.value.trim();

    if(!raBase || !digito || !senha){

        errorMessage.style.display = "block";
        errorMessage.textContent =
            "Preencha todos os campos.";

        return;

    }

    loading.style.display = "block";

try{

    loginBtn.disabled = true;
    loginBtn.style.opacity = "0.7";

    const response = await fetch(
    "https://SEU-PROJETO.vercel.app/api/login",
        {
            method:"POST",
            headers:{
                "Accept":"application/json, text/plain, */*",
                "Content-Type":"application/json",
                "Ocp-Apim-Subscription-Key":API_KEY
            },
            body:JSON.stringify({
                user:ra,
                senha:senha
            })
        }
    );

    const data = await response.json();

        console.log("LOGIN:", data);

        if(!response.ok || data.statusCode !== 200){

            throw new Error("Login inválido");

        }

        /* TOKEN */

        localStorage.setItem(
            "token",
            data.token
        );

        /* NOME */

        localStorage.setItem(
            "nome",
            data.DadosUsuario.NAME
        );

        /* CÓDIGO */

        localStorage.setItem(
    "codigoAluno",
    data.DadosUsuario.CD_USUARIO.toString().slice(0, -1)
);

        /* LOGIN */

        localStorage.setItem(
            "login",
            data.statusRetorno
        );

        /* REDIRECIONAR */

        window.location.href = "dashboard.html";

    }catch(error){

        console.error(error);

        errorMessage.style.display = "block";

        errorMessage.textContent =
            "RA ou senha inválidos.";

    }finally{

    loading.style.display = "none";

    loginBtn.disabled = false;
    loginBtn.style.opacity = "1";

}

});
</script>

</body>
</html>
