 <style>  
*{

body{

/* LOGIN */  
  
.login-container{
    width:100%;
    max-width:420px;
    background:#ffffff;
    padding:35px;
    border-radius:24px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);

    overflow: visible;
    position:relative;
    z-index:1;
}  

.graduation-hat{
    position:absolute;

    top:-18px;
    right:-10px;

    width:110px;
    height:110px;

    transform:rotate(18deg);

    pointer-events:none;

    z-index:10;
}

.graduation-hat svg{
    width:100%;
    height:100%;
    display:block;
}

.hat-shadow{
    filter:drop-shadow(0 8px 18px rgba(111,44,255,0.25));
}
  
.logo{  
    text-align:center;  
    font-size:28px;  
    font-weight:bold;  
    color:#6f2cff;  
    margin-bottom:30px;  
}  
  
.input-group{  
    margin-bottom:20px;  
}  
  
.input-group label{  
    display:block;  
    margin-bottom:8px;  
    font-size:14px;  
    font-weight:600;  
    color:#333;  
}  
  
.input-group input{  
    width:100%;  
    height:55px;  
    border:2px solid #e5e5e5;  
    border-radius:16px;  
    padding:0 18px;  
    font-size:16px;  
    outline:none;  
    transition:0.3s;  
}  
  
.input-group input:focus{  
    border-color:#6f2cff;  
}  
  
.password-wrapper{  
    position:relative;  
}  
  
.toggle-password{  
    position:absolute;  
    right:18px;  
    top:50%;  
    transform:translateY(-50%);  
    background:none;  
    border:none;  
    cursor:pointer;  
    font-size:14px;  
    color:#6f2cff;  
    font-weight:bold;  
}  
  
.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:18px;
    background:#6f2cff;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}  
  
.login-btn:hover{  
    opacity:0.9;  
    transform:translateY(-2px);  
}  
.login-arrow{
    width:22px;
    height:22px;
    color:#fff;

    flex-shrink:0;
}
  
  /* UF DROPDOWN */

.uf-wrapper{
    position:relative;
    width:90px;
}

.uf-button{
    width:100%;
    height:55px;
    border:2px solid #e5e5e5;
    border-radius:16px;
    background:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.uf-button:hover{
    border-color:#6f2cff;
}

.uf-dropdown{
    position:absolute;
    top:65px;
    left:0;
    width:100%;

    background:#fff;
    border-radius:18px;
    padding:8px;

    display:none;
    flex-direction:column;
    gap:8px;

    box-shadow:0 10px 35px rgba(0,0,0,0.08);

    z-index:9999;
}

.uf-item{
    width:100%;
    height:42px;
    border:none;
    border-radius:12px;
    background:#f5f5f5;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.uf-item:hover{
    background:#6f2cff;
    color:#fff;
}
  
.loading{  
    display:none;  
    margin-top:15px;  
    text-align:center;  
    color:#6f2cff;  
    font-weight:bold;  
}  
  
.error-message{  
    display:none;  
    margin-top:15px;  
    text-align:center;  
    color:#ff3b3b;  
    font-size:14px;  
    font-weight:bold;  
}  

/* =========================================
LOADING OVERLAY
========================================= */

.loading-overlay{
    position:fixed;
    inset:0;

    background:rgba(255,255,255,0.35);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    display:none;
    align-items:center;
    justify-content:center;

    z-index:99999;
}

.loading-overlay.active{
    display:flex;
}

.loading-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.loading-icon{
    width:90px;
    height:90px;

    margin-bottom:18px;

    animation:floatIcon 1.5s ease-in-out infinite;
}

.loading-icon svg{
    width:100%;
    height:100%;
}

.loading-text{
    font-size:18px;
    font-weight:bold;
    color:#6f2cff;
}

.loading-dots::after{
    content:"";
    animation:dots 1.2s infinite;
}

@keyframes dots{

    0%{
        content:"";
    }

    33%{
        content:".";
    }

    66%{
        content:"..";
    }

    100%{
        content:"...";
    }

}

@keyframes floatIcon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0px);
    }

}

</style>  </head>

<script>  
const loginForm = document.getElementById("loginForm");  
const togglePassword = document.getElementById("togglePassword");  
const senhaInput = document.getElementById("senha");  
  
  
const loading = document.getElementById("loading");  
const errorMessage = document.getElementById("errorMessage");  

const loginBtn = document.querySelector(".login-btn");  

const loadingOverlay =
    document.getElementById(
        "loadingOverlay"
    );

/* MOSTRAR / OCULTAR SENHA */  
  
const eyeOpen =
    document.getElementById("eyeOpen");

const eyeClosed =
    document.getElementById("eyeClosed");

togglePassword.addEventListener("click", () => {

    if(senhaInput.type === "password"){

        senhaInput.type = "text";

        eyeOpen.style.display = "none";
        eyeClosed.style.display = "block";

    }else{

        senhaInput.type = "password";

        eyeOpen.style.display = "block";
        eyeClosed.style.display = "none";

    }

});  
  
  /* UF DROPDOWN */

const ufButton =
    document.getElementById("ufButton");

const ufDropdown =
    document.getElementById("ufDropdown");

const ufItems =
    document.querySelectorAll(".uf-item");

/* ABRIR */

ufButton.addEventListener(
    "click",
    () => {

        const aberto =
            ufDropdown.style.display === "flex";

        ufDropdown.style.display =
            aberto
            ? "none"
            : "flex";

    }
);

/* SELECIONAR */

ufItems.forEach(item => {

    item.addEventListener(
        "click",
        () => {

            ufButton.textContent =
                item.textContent;

            ufDropdown.style.display =
                "none";

        }
    );

});

/* FECHAR AO CLICAR FORA */

document.addEventListener(
    "click",
    (e) => {

        if(
            !e.target.closest(".uf-wrapper")
        ){

            ufDropdown.style.display =
                "none";

        }

    }
);

/* LOGIN */  
  
loginForm.addEventListener("submit", async (e) => {  
  
    e.preventDefault();  
  
    errorMessage.style.display = "none";  
  
    let raBase = document
    .getElementById("ra")
    .value
    .trim();

let digito = document
    .getElementById("digito")
    .value
    .trim();

const uf =
document
    .getElementById("ufButton")
    .textContent
    .trim();

/*
=========================================
PEGAR DÍGITO AUTOMÁTICO DO RA
=========================================
*/

if(!digito && raBase.length > 1){

    digito =
        raBase.slice(-1);

    raBase =
        raBase.slice(0, -1);

}

const ra =
    `${raBase}${digito}${uf}`;

const senha =
    senhaInput.value.trim();

if(!raBase || !digito || !senha){

    errorMessage.style.display =
        "block";

    errorMessage.textContent =
        "Preencha todos os campos.";

    return;

    }  
  
    loading.style.display = "block";  
  
try{  
  
    loginBtn.disabled = true;  
    loginBtn.style.opacity = "0.7";  
  
    const response = await fetch(  
    "https://representa-api.onrender.com/login",  
    {  
        method:"POST",  
        headers:{  
            "Accept":"application/json, text/plain, */*",  
            "Content-Type":"application/json"  
        },  
        body:JSON.stringify({  
            user:ra,  
            senha:senha  
        })  
    }  
);  
  
    const data = await response.json();  
  
        console.log("LOGIN:", data);  
  
        console.log(data);  
  
if(  
    !response.ok ||  
    (  
        data.statusCode &&  
        data.statusCode !== 200  
    )  
){  
    throw new Error(  
        data.message || "Login inválido"  
    );  
    }  
  
        /* TOKEN */  
  
        localStorage.setItem(  
            "token",  
            data.token  
        );  
  
        /* NOME */  
  
        localStorage.setItem(  
            "nome",  
            data.DadosUsuario.NAME  
        );  
  
        /* CÓDIGO */  
  
        localStorage.setItem(  
    "codigoAluno",  
    data.DadosUsuario.CD_USUARIO.toString().slice(0, -1)  
);  
  
        /* LOGIN */

localStorage.setItem(
    "login",
    ra
);

localStorage.setItem(
    "senha",
    senha
);  
  
/* LOADING */

loadingOverlay.classList.add(
    "active"
);

/* REDIRECIONAR */

setTimeout(() => {

    window.location.href =
        "dashboard.html";

}, 1400);
  
    }catch(error){  
  
        console.error(error);  
  
        errorMessage.style.display = "block";  
  
        errorMessage.textContent =  
            error.message;  
  
    }finally{

    loading.style.display = "none";

    /*
    NÃO REATIVAR O BOTÃO
    SE O LOADING OVERLAY
    ESTIVER ATIVO
    */

    if(
        !loadingOverlay.classList.contains(
            "active"
        )
    ){

        loginBtn.disabled = false;

        loginBtn.style.opacity = "1";

    }

}
  
});  

/*
=========================================
RESETAR TELA AO VOLTAR
=========================================
*/

window.addEventListener(
    "pageshow",
    () => {

        loadingOverlay.classList.remove(
            "active"
        );

        loginBtn.disabled = false;

        loginBtn.style.opacity = "1";

        loading.style.display = "none";

    }
);

</script>  </body>
